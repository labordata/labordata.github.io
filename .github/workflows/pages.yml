name: Build and deploy to GitHub Pages

# Builds the site with a custom Jekyll plugin (_plugins/reactive.rb), which the
# default GitHub Pages build forbids (it runs Jekyll in --safe mode). So we build
# it ourselves here and deploy the result.
#
# Steps: install Ruby + Node deps, bundle the reactive runtime
# (assets/js/reactive-runtime.{js,css}, gitignored), then build Jekyll unsafe.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on a new push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true # bundle install + cache gems

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: _reactive/package-lock.json

      - name: Install reactive tooling
        working-directory: _reactive
        run: npm ci

      - name: Install Chromium (for chart snapshots)
        working-directory: _reactive
        run: npx playwright install --with-deps chromium-headless-shell

      - name: Bundle reactive runtime
        working-directory: _reactive
        run: npm run build # -> assets/js/reactive-runtime.{js,css}

      - name: Build site (unsafe — enables _plugins)
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Pre-render chart fallbacks + social cards
        working-directory: _reactive
        # Loads each reactive post headless, snapshots charts into _site as
        # static SVG fallbacks (for feeds / no-JS) and a PNG og:image card.
        run: node snapshot.mjs
        env:
          SITE_URL: https://labordata.github.io

      - name: Sync to ATmosphere (Standard.Site)
        working-directory: _atproto
        # Publishes/updates site.standard.publication + .document records for each
        # post via @atproto/api. Idempotent. Reads the committed .well-known file.
        # continue-on-error: syndication is a side-channel — a missing secret or an
        # AT Protocol hiccup must never block the GitHub Pages deploy.
        continue-on-error: true
        run: npm ci && npm run sync
        env:
          ATPROTO_PASSWORD: ${{ secrets.ATPROTO_PASSWORD }}
          CI: "true"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
