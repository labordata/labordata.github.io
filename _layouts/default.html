<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en-us">
<head>
  <title>{{ page.title }}</title>
  <meta charset="utf-8">
  <meta name="Description" content="{{ page.description }}">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="alternate" type="application/atom+xml" title="Notes on Labor Data" href="/feed.xml" />
</head>
<body>
  <header class="site-header">
    <div class="site-title">
      <a href="/">Notes on Labor Data</a>
    </div>
    <nav class="site-nav">
      <a href="/archive.html">Archive</a>
      <a href="/feed.xml">RSS</a>
    </nav>
  </header>

  {{ content }}

  <section class="subscribe-form">
    <h3>Subscribe</h3>
    <p class="subscribe-blurb">Get Notes on Labor Data as an email newsletter.</p>
    <form
      action="https://buttondown.email/api/emails/embed-subscribe/labordata"
      method="post"
      target="popupwindow"
      onsubmit="window.open('https://buttondown.email/labordata', 'popupwindow')"
    >
      <label for="bd-email">Email address</label>
      <input type="email" name="email" id="bd-email" required />
      <button type="submit">Subscribe</button>
    </form>
  </section>

  <footer class="site-footer">
    <p>A project of <a rel="me" href="https://bsky.app/profile/bunkum.us">Forest Gregg</a>. Browse the data at <a href="https://labordata.bunkum.us/">labordata.bunkum.us</a>.</p>
  </footer>
</body>
</html>
